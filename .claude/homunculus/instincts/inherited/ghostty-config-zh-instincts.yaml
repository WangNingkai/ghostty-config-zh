# Ghostty Config Zh Workflow Settings Feature Update

## Action

Follow the settings-feature-update workflow:
1. Modify src/lib/components/settings/Item.svelte to update UI or logic for individual settings.
2. Update src/lib/stores/config.svelte.ts to handle new or changed settings logic.
3. Edit src/routes/settings/[category]/+page.svelte to reflect changes in the settings page.
4. Optionally, update src/lib/components/settings/Number.svelte if number settings are affected.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/lib/components/settings/Item.svelte, src/lib/stores/config.svelte.ts, src/routes/settings/[category]/+page.svelte

